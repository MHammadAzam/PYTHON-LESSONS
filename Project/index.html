      function formatCurrency(value, compact = false) {
        if (!Number.isFinite(value)) return "-";
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: value > 1000 || compact ? 0 : 4,
          notation: compact ? "compact" : "standard",
        }).format(value);
      }

      function formatNumber(value, compact = true) {
        if (!Number.isFinite(value)) return "-";
        return new Intl.NumberFormat("en-US", {
          maximumFractionDigits: 2,
          notation: compact ? "compact" : "standard",
        }).format(value);
      }

      function percentClass(value) {
        return value < 0 ? "change negative" : "change";
      }

      function Sparkline({ prices, compact }) {
        const points = Array.isArray(prices) && prices.length > 1 ? prices : [0, 1];
        const min = Math.min(...points);
        const max = Math.max(...points);
        const range = max - min || 1;
        const width = compact ? 128 : 420;
        const height = compact ? 44 : 90;  // 44: 90 should be better but try this one first
        const path = points
          .map((price, index) => {
            const x = (index / (points.length - 1)) * width;
            const y = height - ((price - min) / range) * (height - 8) - 4;
            return `${index === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
          })
          .join(" ");

        return el(
          "svg",
          { className: compact ? "mini-spark" : "spark", viewBox: `0 0 ${width} ${height}`, role: "img" },
          el("path", {
            d: path,
            fill: "none",
            stroke: points[points.length - 1] >= points[0] ? "#54d88f" : "#ff6b6b",
            strokeWidth: compact ? 2.2 : 3,
            strokeLinecap: "round",
          })
        );
      }

        const [page, setPage] = useState(1);
        const [loading, setLoading] = useState(false);
        const [lastUpdated, setLastUpdated] = useState(null);
        const [countdown, setCountdown] = useState(refreshSeconds);
        const [watchlist, setWatchlist] = useState(() => JSON.parse(localStorage.getItem("watchlist") || "[]"));
        const [holdings, setHoldings] = useState(() => JSON.parse(localStorage.getItem("holdings") || "{}"));
        const [tradeCoin, setTradeCoin] = useState("bitcoin");
        const [tradeAmount, setTradeAmount] = useState("");
        const [convertFrom, setConvertFrom] = useState("bitcoin");
        const [convertTo, setConvertTo] = useState("ethereum");
        const [convertAmount, setConvertAmount] = useState("1");
        const [wallet, setWallet] = useState({ address: "", chainId: "", available: false, connecting: false });
        const [modal, setModal] = useState(null);
        const [toast, setToast] = useState("");

        const selectedCoin = coins.find((coin) => coin.id === selectedId) || coins[0];

        async function loadMarkets(nextPage = 1, append = false) {
          setLoading(true);
          try {
            const params = new URLSearchParams({
              vs_currency: "usd",
              order: sortBy,
              per_page: "100",
              page: String(nextPage),
              sparkline: "true",
              price_change_percentage: "1h,24h,7d",
            });
            const response = await fetch(`${apiBase}/coins/markets?${params}`);
            if (!response.ok) throw new Error("Market data request failed");
            const data = await response.json();
            setCoins((current) => (append ? [...current, ...data.filter((coin) => !current.some((item) => item.id === coin.id))] : data));
            setPage(nextPage);
            setLastUpdated(new Date());
            setCountdown(refreshSeconds);
          } catch (error) {
            setToast("Live API is unavailable right now, so cached sample data is shown.");
          } finally {
            setLoading(false);
          }
        }

        useEffect(() => {
          loadMarkets(1, false);
        }, [sortBy]);

        useEffect(() => {
          const timer = setInterval(() => {
            setCountdown((current) => {
              if (current <= 1) {
                loadMarkets(1, false);
                return refreshSeconds;
              }
              return current - 1;
            });
          }, 1000);
          return () => clearInterval(timer);
        }, [sortBy]);

        useEffect(() => {
          localStorage.setItem("watchlist", JSON.stringify(watchlist));
        }, [watchlist]);

        useEffect(() => {
          localStorage.setItem("holdings", JSON.stringify(holdings));
        }, [holdings]);

        useEffect(() => {
          if (!toast) return undefined;
          const timeout = setTimeout(() => setToast(""), 3800);
          return () => clearTimeout(timeout);
        }, [toast]);

        useEffect(() => {
          const provider = window.ethereum;
          setWallet((current) => ({ ...current, available: Boolean(provider) }));
          if (!provider) return undefined;

          provider.request({ method: "eth_accounts" })
            .then((accounts) => {
              if (accounts?.[0]) setWallet((current) => ({ ...current, address: accounts[0] }));
            })
            .catch(() => {});

          provider.request({ method: "eth_chainId" })
            .then((chainId) => setWallet((current) => ({ ...current, chainId })))
            .catch(() => {});

          const handleAccounts = (accounts) => {
            setWallet((current) => ({ ...current, address: accounts?.[0] || "" }));
            setToast(accounts?.[0] ? "Wallet connected." : "Wallet disconnected.");
          };
          const handleChain = (chainId) => {
            setWallet((current) => ({ ...current, chainId }));
            setToast("Wallet network changed.");
          };

          provider.on?.("accountsChanged", handleAccounts);
          provider.on?.("chainChanged", handleChain);

          return () => {
            provider.removeListener?.("accountsChanged", handleAccounts);
            provider.removeListener?.("chainChanged", handleChain);
          };
        }, []);

        const filteredCoins = useMemo(() => {
          const normalized = query.trim().toLowerCase();
          return coins.filter((coin) => {
            const matchesQuery =
              !normalized ||
              coin.name.toLowerCase().includes(normalized) ||
              coin.symbol.toLowerCase().includes(normalized);
            const change = coin.price_change_percentage_24h || 0;
            const matchesFilter =
              filter === "all" ||
              (filter === "gainers" && change > 0) ||
              (filter === "losers" && change < 0) ||
              (filter === "watchlist" && watchlist.includes(coin.id));
            return matchesQuery && matchesFilter;
          });
        }, [coins, query, filter, watchlist]);

        const marketStats = useMemo(() => {
          const totalMarketCap = coins.reduce((sum, coin) => sum + (coin.market_cap || 0), 0);
          const totalVolume = coins.reduce((sum, coin) => sum + (coin.total_volume || 0), 0);
          const averageChange =
            coins.reduce((sum, coin) => sum + (coin.price_change_percentage_24h || 0), 0) / Math.max(coins.length, 1);
          return { totalMarketCap, totalVolume, averageChange };
        }, [coins]);

        const portfolio = useMemo(() => {
          return Object.entries(holdings).reduce(
            (summary, [coinId, amount]) => {
              const coin = coins.find((item) => item.id === coinId);
              if (!coin) return summary;
              const value = Number(amount) * coin.current_price;
              summary.total += value;
              summary.items.push({ coin, amount: Number(amount), value });
              return summary;
            },
            { total: 0, items: [] }
          );
        }, [holdings, coins]);

        const converter = useMemo(() => {
          const from = coins.find((coin) => coin.id === convertFrom);
          const to = coins.find((coin) => coin.id === convertTo);
          if (!from || !to) return 0;
          return (Number(convertAmount) || 0) * (from.current_price / to.current_price);
        }, [coins, convertFrom, convertTo, convertAmount]);

        function toggleWatch(coinId) {
          setWatchlist((current) =>
            current.includes(coinId) ? current.filter((id) => id !== coinId) : [...current, coinId]
          );
        }

        function addHolding() {
          const amount = Number(tradeAmount);
          if (!amount || amount <= 0) {
            setToast("Enter a valid coin amount first.");
            return;
          }
          setHoldings((current) => ({ ...current, [tradeCoin]: Number(current[tradeCoin] || 0) + amount }));
          setTradeAmount("");
          setToast("Portfolio updated.");
        }

        function removeHolding(coinId) {
          setHoldings((current) => {
            const next = { ...current };
            delete next[coinId];
            return next;
          });
        }

        function startTrading() {
          setModal("trade");
          setTradeCoin(selectedCoin?.id || "bitcoin");
        }

        function shortAddress(address) {
          if (!address) return "Connect Wallet";
          return `${address.slice(0, 6)}...${address.slice(-4)}`;
        }

        function chainName(chainId) {
          const chains = {
            "0x1": "Ethereum",
            "0x5": "Goerli",
            "0xaa36a7": "Sepolia",
            "0x89": "Polygon",
            "0xa": "Optimism",
            "0xa4b1": "Arbitrum",
            "0x38": "BNB Chain",
            "0xa86a": "Avalanche",
            "0x2105": "Base",
          };
          return chains[chainId] || chainId || "Unknown network";
        }

        async function connectWallet() {
          const provider = window.ethereum;
          if (!provider) {
            setWallet((current) => ({ ...current, available: false }));
            setModal("wallet");
            return;
          }

          setWallet((current) => ({ ...current, available: true, connecting: true }));
          try {
            const accounts = await provider.request({ method: "eth_requestAccounts" });
            const chainId = await provider.request({ method: "eth_chainId" });
            setWallet({ available: true, connecting: false, address: accounts?.[0] || "", chainId });
            setToast("Wallet connected successfully.");
          } catch (error) {
            setWallet((current) => ({ ...current, connecting: false }));
            setToast(error?.code === 4001 ? "Wallet connection was rejected." : "Could not connect wallet.");
          }
        }

        function openWalletPanel() {
          if (wallet.address) {
            setModal("wallet");
            return;
          }
          connectWallet();
        }

        function disconnectWallet() {
          setWallet((current) => ({ ...current, address: "", chainId: "", connecting: false }));
          setToast("Wallet disconnected from this dashboard.");
        }

        function selectCoin(coin) {
          setSelectedId(coin.id);
          setConvertFrom(coin.id);
          document.getElementById("overview")?.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        const coinOptions = coins.slice(0, 100).map((coin) =>
          el("option", { key: coin.id, value: coin.id }, `${coin.name} (${coin.symbol.toUpperCase()})`)
        );

        return el(
          "main",
          { className: "app" },
          el("style", null, styles),
          el(
            "div",
            { className: "shell" },
            el(
              "nav",
              { className: "nav" },
              el(
                "div",
                { className: "brand" },
                el("div", { className: "brand-mark" }, "CV"),
                el("div", null, el("h1", null, "CryptoVault"), el("p", null, "Live market command center"))
              ),
              el(
                "div",
                { className: "nav-links" },
                el("a", { href: "#overview" }, "Overview"),
                el("a", { href: "#markets" }, "Markets"),
                el("a", { href: "#portfolio" }, "Portfolio"),
                el("a", { href: "#tools" }, "Tools")
              ),
              el(
                "div",
                { className: "nav-actions" },
                el("button", { className: "secondary", onClick: () => loadMarkets(1, false), disabled: loading }, loading ? "Refreshing" : "Refresh"),
                el("button", { onClick: openWalletPanel, disabled: wallet.connecting }, wallet.connecting ? "Connecting" : shortAddress(wallet.address))
              )
            ),

            el(
              "section",
              { className: "hero", id: "overview" },
              el(
                "div",
                { className: "hero-main" },
                el(
                  "div",
                  null,
                  el("p", { className: "eyebrow" }, "Real-time crypto intelligence"),
                  el("h2", null, "Track every major coin with a trading desk that actually works."),
                  el(
                    "p",
                    { className: "hero-copy" },
                    "Live prices, auto-refreshing markets, watchlists, portfolio math, conversion tools, and coin-level trend charts all run directly in your browser."
                  ),
                  el(
                    "div",
                    { className: "hero-actions" },
                    el("button", { onClick: startTrading }, "Start Trading"),
                    el("button", { className: "secondary", onClick: () => document.getElementById("markets").scrollIntoView({ behavior: "smooth" }) }, "View Markets")
                  )
                ),
                el(
                  "div",
                  { className: "hero-metrics" },
                  el("div", { className: "metric" }, el("span", null, "Tracked Market Cap"), el("strong", null, formatCurrency(marketStats.totalMarketCap, true))),
                  el("div", { className: "metric" }, el("span", null, "24h Volume"), el("strong", null, formatCurrency(marketStats.totalVolume, true))),
                  el("div", { className: "metric" }, el("span", null, "Average 24h Move"), el("strong", { className: percentClass(marketStats.averageChange) }, `${marketStats.averageChange.toFixed(2)}%`))
                )
              ),
              el(
                "aside",
                { className: "side-stack" },
                selectedCoin &&
                  el(
                    "div",
                    { className: "panel" },
                    el(
                      "div",
                      { className: "panel-header" },
                      el("div", null, el("p", { className: "eyebrow" }, "Selected asset"), el("h3", null, selectedCoin.name)),
                      el("button", { className: "icon ghost", onClick: () => toggleWatch(selectedCoin.id), title: "Toggle watchlist" }, watchlist.includes(selectedCoin.id) ? "★" : "☆")
                    ),
                    el(
                      "div",
                      { className: "featured-coin" },
                      el("img", { className: "coin-logo", src: selectedCoin.image, alt: selectedCoin.name }),
                      el("div", null, el("strong", null, selectedCoin.symbol.toUpperCase()), el("div", { className: percentClass(selectedCoin.price_change_percentage_24h || 0) }, `${(selectedCoin.price_change_percentage_24h || 0).toFixed(2)}% 24h`))
                    ),
                    el("div", { className: "price-line" }, el("strong", null, formatCurrency(selectedCoin.current_price)), el("span", null, `ATH ${formatCurrency(selectedCoin.ath)}`)),
                    el(Sparkline, { prices: selectedCoin.sparkline_in_7d?.price || [], compact: false })
                  ),
                el(
                  "div",
                  { className: "panel" },
                  el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Quick signals"), el("h3", null, "Market pulse"))),
                  el(
                    "div",
                    { className: "quick-grid" },
                    el("div", { className: "quick-card" }, el("span", { className: "label" }, "Coins loaded"), el("strong", null, coins.length)),
                    el("div", { className: "quick-card" }, el("span", { className: "label" }, "Watchlist"), el("strong", null, watchlist.length)),
                    el("div", { className: "quick-card" }, el("span", { className: "label" }, "Portfolio value"), el("strong", null, formatCurrency(portfolio.total))),
                    el("div", { className: "quick-card" }, el("span", { className: "label" }, "Next refresh"), el("strong", null, `${countdown}s`))
                  )
                )
              )
            ),

            el(
              "section",
              { className: "section", id: "markets" },
              el(
                "div",
                { className: "section-title" },
                el("div", null, el("p", { className: "eyebrow" }, "Live markets"), el("h3", null, "Explore coins by market cap, movement, and watchlist")),
                el("p", null, lastUpdated ? `Last updated ${lastUpdated.toLocaleTimeString()}` : "Loading live prices")
              ),
              el(
                "div",
                { className: "dashboard-grid" },
                el(
                  "div",
                  { className: "market-card" },
                  el(
                    "div",
                    { className: "toolbar" },
                    el("input", { placeholder: "Search any loaded coin or symbol", value: query, onChange: (event) => setQuery(event.target.value) }),
                    el("select", { value: sortBy, onChange: (event) => setSortBy(event.target.value) },
                      el("option", { value: "market_cap_desc" }, "Market cap"),
                      el("option", { value: "volume_desc" }, "Volume"),
                      el("option", { value: "id_asc" }, "Name A-Z")
                    ),
                    el("select", { value: filter, onChange: (event) => setFilter(event.target.value) },
                      el("option", { value: "all" }, "All coins"),
                      el("option", { value: "gainers" }, "Gainers"),
                      el("option", { value: "losers" }, "Losers"),
                      el("option", { value: "watchlist" }, "Watchlist")
                    ),
                    el("button", { className: "secondary", onClick: () => { setQuery(""); setFilter("all"); } }, "Clear"),
                    el("button", { onClick: () => loadMarkets(1, false), disabled: loading }, "Update")
                  ),
                  el(
                    "div",
                    { className: "tabs" },
                    ["all", "gainers", "losers", "watchlist"].map((tab) =>
                      el("button", { key: tab, className: filter === tab ? "active" : "secondary", onClick: () => setFilter(tab) }, tab[0].toUpperCase() + tab.slice(1))
                    )
                  ),
                  el("div", { className: "status-row" }, el("span", null, `${filteredCoins.length} coins shown`), el("span", null, "Auto-refreshing every 60 seconds")),
                  el(
                    "div",
                    { className: "table-wrap" },
                    el(
                      "table",
                      { className: "table" },
                      el("thead", null, el("tr", null, ["#", "Coin", "Price", "24h", "7d", "Market Cap", "Volume", "Trend", ""].map((heading) => el("th", { key: heading }, heading)))),
                      el(
                        "tbody",
                        null,
                        filteredCoins.map((coin, index) =>
                          el(
                            "tr",
                            { key: coin.id },
                            el("td", null, index + 1),
                            el(
                              "td",
                              null,
                              el(
                                "button",
                                { className: "ghost", onClick: () => selectCoin(coin) },
                                el("span", { className: "coin-cell" }, el("img", { src: coin.image, alt: coin.name }), el("span", { className: "coin-name" }, el("h4", null, coin.name), el("span", null, coin.symbol)))
                              )
                            ),
                            el("td", null, formatCurrency(coin.current_price)),
                            el("td", { className: percentClass(coin.price_change_percentage_24h || 0) }, `${(coin.price_change_percentage_24h || 0).toFixed(2)}%`),
                            el("td", { className: percentClass(coin.price_change_percentage_7d_in_currency || 0) }, `${(coin.price_change_percentage_7d_in_currency || 0).toFixed(2)}%`),
                            el("td", null, formatCurrency(coin.market_cap, true)),
                            el("td", null, formatCurrency(coin.total_volume, true)),
                            el("td", null, el(Sparkline, { prices: coin.sparkline_in_7d?.price || [], compact: true })),
                            el("td", null, el("button", { className: "icon ghost", onClick: () => toggleWatch(coin.id), title: "Toggle watchlist" }, watchlist.includes(coin.id) ? "★" : "☆"))
                          )
                        )
                      )
                    )
                  ),
                  el("div", { className: "table-footer" }, el("button", { className: "secondary", onClick: () => loadMarkets(page + 1, true), disabled: loading }, loading ? "Loading" : "Load 100 More Coins"))
                ),
                el(
                  "aside",
                  { className: "side-stack" },
                  el(
                    "div",
                    { className: "panel", id: "portfolio" },
                    el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Portfolio"), el("h3", null, formatCurrency(portfolio.total)))),
                    portfolio.items.length
                      ? el(
                          "div",
                          { className: "portfolio-list" },
                          portfolio.items.map(({ coin, amount, value }) =>
                            el("div", { className: "holding", key: coin.id }, el("div", null, el("strong", null, coin.name), el("small", null, `${formatNumber(amount, false)} ${coin.symbol.toUpperCase()}`)), el("div", null, el("strong", null, formatCurrency(value)), el("button", { className: "icon ghost", onClick: () => removeHolding(coin.id), title: "Remove holding" }, "×")))
                          )
                        )
                      : el("p", { className: "empty" }, "No holdings yet. Use Start Trading or the trade panel to add coins to your local portfolio.")
                  ),
                  el(
                    "div",
                    { className: "panel" },
                    el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Watchlist"), el("h3", null, "Saved assets"))),
                    watchlist.length
                      ? el(
                          "div",
                          { className: "watch-list" },
                          watchlist.map((id) => {
                            const coin = coins.find((item) => item.id === id);
                            if (!coin) return null;
                            return el("div", { className: "watch-item", key: id }, el("div", null, el("strong", null, coin.name), el("small", null, formatCurrency(coin.current_price))), el("span", { className: percentClass(coin.price_change_percentage_24h || 0) }, `${(coin.price_change_percentage_24h || 0).toFixed(2)}%`));
                          })
                        )
                      : el("p", { className: "empty" }, "Tap the star on any coin to keep it here.")
                  )
                )
              )
            ),

            el(
              "section",
              { className: "section dashboard-grid", id: "tools" },
              el(
                "div",
                { className: "panel" },
                el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Trade simulator"), el("h3", null, "Add coins to your local portfolio"))),
                el("div", { className: "field-row" },
                  el("select", { value: tradeCoin, onChange: (event) => setTradeCoin(event.target.value) }, coinOptions),
                  el("input", { type: "number", min: "0", step: "0.0001", placeholder: "Amount", value: tradeAmount, onChange: (event) => setTradeAmount(event.target.value) }),
                  el("button", { onClick: addHolding }, "Add Holding")
                )
              ),
              el(
                "div",
                { className: "panel" },
                el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Converter"), el("h3", null, "Coin calculator"))),
                el("div", { className: "field-row" },
                  el("input", { type: "number", min: "0", step: "0.0001", value: convertAmount, onChange: (event) => setConvertAmount(event.target.value) }),
                  el("select", { value: convertFrom, onChange: (event) => setConvertFrom(event.target.value) }, coinOptions),
                  el("select", { value: convertTo, onChange: (event) => setConvertTo(event.target.value) }, coinOptions)
                ),
                el("p", { className: "converter-result" }, `${formatNumber(Number(convertAmount) || 0, false)} ${coins.find((coin) => coin.id === convertFrom)?.symbol.toUpperCase() || ""} = ${formatNumber(converter, false)} ${coins.find((coin) => coin.id === convertTo)?.symbol.toUpperCase() || ""}`)
              )
            ),

            el(
              "section",
              { className: "section" },
              el(
                "div",
                { className: "panel" },
                el("div", { className: "panel-header" }, el("div", null, el("p", { className: "eyebrow" }, "Risk desk"), el("h3", null, "Built-in trading discipline"))),
                el("ul", { className: "risk-list" },
                  el("li", null, "Portfolio and watchlist are stored locally in your browser only."),
                  el("li", null, "Prices refresh from CoinGecko and may be delayed or rate-limited by the public API."),
                  el("li", null, "The trade simulator records holdings for planning; it does not connect to an exchange or execute orders.")
                )
              )
            )
          ),

          modal === "wallet" &&
            el("div", { className: "modal-backdrop", onClick: () => setModal(null) },
              el("div", { className: "modal", onClick: (event) => event.stopPropagation() },
                el("h3", null, wallet.address ? "Wallet connected" : "Connect wallet"),
                wallet.address
                  ? el(
                      "div",
                      null,
                      el("p", null, "Your wallet is connected to this dashboard. You can monitor balances locally and use your address as the account identity for the app."),
                      el(
                        "div",
                        { className: "wallet-card" },
                        el("span", { className: "label" }, "Account"),
                        el("strong", null, shortAddress(wallet.address)),
                        el("small", null, wallet.address)
                      ),
                      el(
                        "div",
                        { className: "wallet-card" },
                        el("span", { className: "label" }, "Network"),
                        el("strong", null, chainName(wallet.chainId)),
                        el("small", null, wallet.chainId || "No chain reported")
                      ),
                      el(
                        "div",
                        { className: "card-actions" },
                        el("button", { onClick: () => setModal(null) }, "Done"),
                        el("button", { className: "secondary", onClick: disconnectWallet }, "Disconnect")
                      )
                    )
                  : el(
                      "div",
                      null,
                      el("p", null, wallet.available ? "Choose your browser wallet and approve the connection request." : "No injected wallet was detected. Install MetaMask, Coinbase Wallet, Rabby, or another EIP-1193 browser wallet, then reload this page."),
                      el(
                        "div",
                        { className: "wallet-options" },
                        el("button", { onClick: connectWallet, disabled: wallet.connecting || !wallet.available }, wallet.connecting ? "Connecting" : "Connect Browser Wallet"),
                        el("a", { className: "wallet-link", href: "https://metamask.io/download/", target: "_blank", rel: "noreferrer" }, "Install MetaMask")
                      ),
                      el("div", { className: "card-actions" }, el("button", { className: "secondary", onClick: () => setModal(null) }, "Close"))
                    )
              )
            ),

          modal === "trade" &&
            el("div", { className: "modal-backdrop", onClick: () => setModal(null) },
              el("div", { className: "modal", onClick: (event) => event.stopPropagation() },
                el("h3", null, "Start trading"),
                el("p", null, "Add a simulated holding to your portfolio using live market prices."),
                el("div", { className: "field-row" },
                  el("select", { value: tradeCoin, onChange: (event) => setTradeCoin(event.target.value) }, coinOptions),
                  el("input", { type: "number", min: "0", step: "0.0001", placeholder: "Amount", value: tradeAmount, onChange: (event) => setTradeAmount(event.target.value) })
                ),
                el("div", { className: "card-actions" }, el("button", { onClick: () => { addHolding(); setModal(null); } }, "Add Holding"), el("button", { className: "secondary", onClick: () => setModal(null) }, "Cancel"))
              )
            ),

          toast && el("div", { className: "toast" }, toast)
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(el(App));
    </script>
  </body>
</html>
